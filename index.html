<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Heróis da Fé - Plataforma gamificada de leitura da Bíblia">
  <meta name="theme-color" content="#d4af37">
  <title>Heróis da Fé - Jornada Espiritual Gamificada</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4783566653978134" crossorigin="anonymous"></script>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/imagens/icon-96.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
  <aside id="side-menu" class="side-menu" style="display:none;">
    <button id="close-menu" class="close-btn">×</button>
    <section class="profile-section">
      <div class="sidebar-user-top">
        <div id="user-profile-pic" class="profile-pic">👤</div>
        <div class="sidebar-user-info">
          <div id="user-name-display">Carregando...</div>
          <div id="user-points-display">0 pts</div>
        </div>
      </div>
      <div class="exp-card">
        <div class="exp-head"><span>Nível <strong id="nivel-numero">1</strong></span><span id="exp-texto">0%</span></div>
        <div class="exp-track"><div id="exp-bar-fill" class="exp-fill"></div></div>
        <div class="exp-sub">EXP para próximo nível</div>
      </div>
      <div class="sidebar-actions-two">
        <button id="btn-perfil-menu" class="glass-btn gold">PERFIL</button>
        <button id="btn-sair-menu" class="glass-btn red">SAIR DO JOGO</button>
      </div>
    </section>

    <section class="sidebar-ad-wrap">
      <h3 class="sidebar-title">PUBLICIDADE</h3>
      <div class="sidebar-ad-card">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4783566653978134" data-ad-slot="3940373913" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </section>

    <section class="friend-search-wrap">
      <div class="search-wrap"><span>🔎</span><input type="text" id="sidebar-search-input" placeholder="Buscar amigo" autocomplete="off"></div>
      <div id="sidebar-search-results"></div>
    </section>

    <section class="friends-container">
      <div id="lista-amigos-sidebar" class="scroll-area"><div class="friend-empty">Carregando amigos...</div></div>
    </section>
  </aside>

  <header class="top-nav" style="display:none;">
    <button id="open-menu" class="menu-icon">MENU</button>
    <nav class="nav-buttons"><button id="nav-ranking">🏆 RANKING</button><button id="nav-biblia">📖 BÍBLIA</button></nav>
    <div id="user-header-info"></div>
    <div class="logo-text">HERÓIS DA FÉ</div>
  </header>

  <main id="main-content">
    <section id="auth-container" class="auth-card">
      <div class="auth-header"><span class="auth-logo">⚜️ HERÓIS DA FÉ</span></div>
      <div class="auth-tabs"><button id="tab-entrar" class="tab-btn active">ENTRAR</button><button id="tab-cadastrar" class="tab-btn">CADASTRAR</button></div>
      <form id="form-entrar" class="auth-form">
        <input type="email" id="login-email" placeholder="Seu E-mail" required>
        <input type="password" id="login-senha" placeholder="Sua Senha" required>
        <button type="button" id="btn-entrar" class="btn-mission gold-shine">ENTRAR NO JOGO</button>
        <div class="auth-action-row secondary"><button type="button" id="btn-recuperar-senha" class="auth-special-btn gray-glass">Recuperar Senha</button></div>
        <div class="auth-action-row"><button type="button" id="btn-instalar-app-login" class="auth-special-btn gold-shine" style="display:none;">📲 Download do App</button><button type="button" id="btn-compartilhar-app" class="auth-special-btn emerald-glass">✨ Compartilhar App</button></div>
      </form>
      <form id="form-cadastrar" class="auth-form" style="display:none;">
        <input type="text" id="reg-nome" placeholder="Nome" required maxlength="12"><small class="auth-field-tip">Máximo de 12 caracteres</small>
        <input type="email" id="reg-email" placeholder="E-mail" required>
        <input type="password" id="reg-senha" placeholder="Senha" required minlength="8"><small class="auth-field-tip">Mínimo de 8 dígitos</small>
        <input type="text" id="reg-data-nascimento" placeholder="dd/mm/aaaa" required inputmode="numeric" maxlength="10" autocomplete="bday">
        <button type="button" id="btn-registrar" class="btn-mission gold-shine compact-mission-btn">INICIAR JORNADA</button>
      </form>
      <div id="reset-password-box" class="auth-form" style="display:none;">
        <input type="password" id="reset-nova-senha" placeholder="Nova senha" minlength="8"><small class="auth-field-tip">Mínimo de 8 dígitos</small>
        <input type="password" id="reset-confirmar-senha" placeholder="Confirmar nova senha" minlength="8">
        <div id="reset-password-message" class="auth-field-tip">Digite sua nova senha para concluir.</div>
        <div class="auth-action-row"><button type="button" id="btn-resetar-senha" class="auth-special-btn gold-shine">SALVAR NOVA SENHA</button></div>
        <div class="auth-action-row secondary"><button type="button" id="btn-cancelar-reset" class="auth-special-btn gray-glass">Cancelar</button></div>
      </div>
    </section>

    <section id="reading-view" class="reading-container" style="display:none;"><div id="bible-text"></div></section>
    <section id="ranking-container" style="display:none;"></section>
  </main>

  <input type="file" id="foto-input" accept="image/*" style="display:none;">

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/reset-password.js"></script>
  <script type="module" src="js/bible.js"></script>
  <script type="module" src="js/game.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/chat.js"></script>
  <script type="module" src="js/social.js"></script>
  <script type="module" src="js/badges.js"></script>
  <script type="module" src="js/stats.js"></script>
  <script type="module" src="js/challenges.js"></script>

  <script type="module">
    import { supabase } from './js/config.js';
    import { atualizarBarraExpMenu } from './js/badges.js';
    import { iniciarListenerUsuario, pararListenerUsuario } from './js/auth.js';
    import { iniciarSocial } from './js/social.js';
    import { iniciarMonitorChat } from './js/chat.js';

    const header = document.querySelector('.top-nav');
    const sidebar = document.getElementById('side-menu');
    const authContainer = document.getElementById('auth-container');
    const readingView = document.getElementById('reading-view');
    const pointsEl = document.getElementById('user-points-display');
    const nivelNum = document.getElementById('nivel-numero');
    const expTexto = document.getElementById('exp-texto');
    const expBar = document.getElementById('exp-bar-fill');

    let currentUid = null;
    let realtimeMenuChannel = null;
    window._paginaAtualJogo = 'biblia-home';

    function mostrarTelaLogin(){ if (header) header.style.display='none'; if (sidebar) sidebar.style.display='none'; if (authContainer) authContainer.style.display='block'; if (readingView) readingView.style.display='none'; }
    function mostrarJogo(){ if (header) header.style.display='flex'; if (sidebar) sidebar.style.display='block'; if (authContainer) authContainer.style.display='none'; if (readingView) readingView.style.display='block'; }
    function aplicarResumoMenu(userData){ if (!userData) return; if (pointsEl) pointsEl.textContent = `${userData.points || 0} pts`; if (nivelNum) nivelNum.textContent = `${userData.nivel || 1}`; const ev = userData.expAtual ?? userData.expatual ?? 0; if (expTexto) expTexto.textContent = `${ev}%`; if (expBar) expBar.style.width = `${ev}%`; }

    async function atualizarMenuUsuario(uid){
      const { data: userData } = await supabase.from('users').select('*').eq('uid',uid).single();
      aplicarResumoMenu(userData);
      const { data: progData } = await supabase.from('progresso').select('concluido').eq('uid',uid).eq('concluido',true);
      atualizarBarraExpMenu(progData?.length || 0);
    }

    async function inicializarUsuario(user){
      currentUid = user.id;
      mostrarJogo();
      await iniciarListenerUsuario(user);
      iniciarSocial(user);
      iniciarMonitorChat(user);
      await atualizarMenuUsuario(user.id);
      try { window.carregarListaLivros?.(); } catch(e) { console.error(e); }
      if (realtimeMenuChannel) { supabase.removeChannel(realtimeMenuChannel); }
      realtimeMenuChannel = supabase.channel('menu-user-'+user.id).on('postgres_changes',{event:'*',schema:'public',table:'users',filter:`uid=eq.${user.id}`},(payload)=>aplicarResumoMenu(payload.new)).subscribe();
      history.replaceState({page:'jogo'}, '');
    }

    supabase.auth.onAuthStateChange(async (_event, session) => {
      const user = session?.user ?? null;
      if (user) await inicializarUsuario(user); else { currentUid = null; if (realtimeMenuChannel) supabase.removeChannel(realtimeMenuChannel); try { pararListenerUsuario(); } catch {} mostrarTelaLogin(); }
    });

    const { data:{ session } } = await supabase.auth.getSession();
    if (session?.user) await inicializarUsuario(session.user); else mostrarTelaLogin();

    window.addEventListener('exp_atualizada', (e) => { const totalCaps = e.detail?.totalCaps; if (typeof totalCaps === 'number') atualizarBarraExpMenu(totalCaps); });
    window.voltarParaBiblia = function(){ document.getElementById('ranking-container').style.display='none'; document.getElementById('reading-view').style.display='block'; window._paginaAtualJogo='biblia-home'; window.carregarListaLivros?.(); };

    let promptInstalacao = null;
    function atualizarBotaoInstalar(){ const btn = document.getElementById('btn-instalar-app-login'); if (btn) btn.style.display = promptInstalacao ? 'inline-flex' : 'none'; }
    window.addEventListener('beforeinstallprompt', (event) => { event.preventDefault(); promptInstalacao = event; atualizarBotaoInstalar(); });
    window.addEventListener('appinstalled', ()=>{ promptInstalacao = null; atualizarBotaoInstalar(); });
    document.addEventListener('click', async (event) => {
      const btnInstalar = event.target.closest('#btn-instalar-app-login');
      if (btnInstalar && promptInstalacao) { promptInstalacao.prompt(); await promptInstalacao.userChoice; promptInstalacao = null; atualizarBotaoInstalar(); }
      const btnCompartilhar = event.target.closest('#btn-compartilhar-app');
      if (btnCompartilhar) {
        const payload = { title:'Heróis da Fé', text:'Venha jogar Heróis da Fé comigo!', url: window.location.href };
        if (navigator.share) { try { await navigator.share(payload); } catch {} }
        else { await navigator.clipboard.writeText(window.location.href); alert('Link copiado!'); }
      }
    });

    if ('serviceWorker' in navigator) {
      try { const reg = await navigator.serviceWorker.register('/sw.js'); if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING'); } catch(e){ console.warn(e); }
    }
  </script>
</body>
</html>
