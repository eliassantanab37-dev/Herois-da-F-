<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#d4af37">
  <title>Heróis da Fé</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4783566653978134" crossorigin="anonymous"></script>
</head>
<body>
  <aside id="side-menu" class="side-menu" style="display:none;">
    <button id="close-menu" class="close-btn">×</button>

    <section class="profile-section">
      <div class="profile-header-line">
        <div id="user-profile-pic" class="profile-pic">👤</div>
        <div class="profile-head-info">
          <div id="user-name-display">Carregando...</div>
          <div id="user-points-display">0 pts</div>
        </div>
      </div>

      <div class="exp-card">
        <div class="exp-row">
          <span>Nível <strong id="nivel-numero">1</strong></span>
          <span id="exp-texto">0%</span>
        </div>
        <div class="exp-bar"><div id="exp-bar-fill"></div></div>
      </div>

      <div class="profile-btn-row">
        <button class="glass-btn gold half" onclick="window.verPerfilDetalhado((window.__meuUid||''))">PERFIL</button>
        <button id="btn-sair-menu" class="glass-btn red half">SAIR</button>
      </div>
    </section>

    <section class="sidebar-ad-wrap">
      <div class="sidebar-ad-card">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4783566653978134" data-ad-slot="3940373913" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </section>

    <section>
      <input type="text" id="sidebar-search-input" class="search-input" placeholder="Buscar amigo">
      <div id="sidebar-search-results"></div>
    </section>

    <section class="friends-container">
      <div id="lista-amigos-sidebar" class="scroll-area"><div class="empty-state small">Carregando amigos...</div></div>
    </section>
  </aside>

  <header class="top-nav" style="display:none;">
    <button id="open-menu" class="menu-icon">MENU</button>
    <nav class="nav-buttons">
      <button id="nav-ranking">🏆 RANKING</button>
      <button id="nav-biblia">📖 BÍBLIA</button>
    </nav>
    <div id="user-header-info"></div>
    <div class="logo-text">HERÓIS DA FÉ</div>
  </header>

  <main id="main-content">
    <section id="auth-container" class="auth-card">
      <div class="auth-header"><span class="auth-logo">⚜️ HERÓIS DA FÉ</span></div>
      <div class="auth-tabs">
        <button id="tab-entrar" class="tab-btn active">ENTRAR</button>
        <button id="tab-cadastrar" class="tab-btn">CADASTRAR</button>
      </div>

      <form id="form-entrar" class="auth-form">
        <input type="email" id="login-email" placeholder="Seu e-mail" required>
        <input type="password" id="login-senha" placeholder="Sua senha" required>
        <button type="button" id="btn-entrar" class="glass-btn gold full">ENTRAR NO JOGO</button>
        <button type="button" id="btn-recuperar-senha" class="glass-btn gray full">Recuperar senha</button>
      </form>

      <form id="form-cadastrar" class="auth-form" style="display:none;">
        <input type="text" id="reg-nome" maxlength="12" placeholder="Nome" required>
        <small class="auth-field-tip">Máximo de 12 caracteres</small>
        <input type="email" id="reg-email" placeholder="E-mail" required>
        <input type="password" id="reg-senha" minlength="8" placeholder="Senha" required>
        <small class="auth-field-tip">Mínimo de 8 caracteres</small>
        <input type="text" id="reg-data-nascimento" placeholder="dd/mm/aaaa" maxlength="10" required>
        <button type="button" id="btn-registrar" class="glass-btn gold full">INICIAR JORNADA</button>
      </form>

      <div id="reset-password-box" class="auth-form" style="display:none;">
        <input type="password" id="reset-nova-senha" placeholder="Nova senha">
        <input type="password" id="reset-confirmar-senha" placeholder="Confirmar nova senha">
        <div id="reset-password-message" class="auth-field-tip">Digite sua nova senha.</div>
        <button type="button" id="btn-resetar-senha" class="glass-btn gold full">SALVAR NOVA SENHA</button>
        <button type="button" id="btn-cancelar-reset" class="glass-btn gray full">Cancelar</button>
      </div>
    </section>

    <section id="reading-view" class="reading-container" style="display:none;">
      <div id="bible-text"></div>
    </section>
  </main>

  <input type="file" id="foto-input" accept="image/*" style="display:none;">

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/app-core.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/reset-password.js"></script>
  <script type="module" src="js/badges.js"></script>
  <script type="module" src="js/bible.js"></script>
  <script type="module" src="js/game.js"></script>
  <script type="module" src="js/social.js"></script>
  <script type="module" src="js/chat.js"></script>
  <script type="module" src="js/stats.js"></script>
  <script type="module" src="js/challenges.js"></script>
  <script type="module" src="js/ui.js"></script>

  <script type="module">
    import { supabase } from './js/config.js';
    import { iniciarListenerUsuario, pararListenerUsuario } from './js/auth.js';
    import { iniciarSocial } from './js/social.js';
    import { iniciarMonitorChat } from './js/chat.js';
    import { atualizarBarraExpMenu } from './js/badges.js';

    const header = document.querySelector('.top-nav');
    const sidebar = document.getElementById('side-menu');
    const authContainer = document.getElementById('auth-container');
    const readingView = document.getElementById('reading-view');

    function mostrarLogin() {
      header.style.display = 'none';
      sidebar.style.display = 'none';
      authContainer.style.display = 'block';
      readingView.style.display = 'none';
    }

    function mostrarJogo() {
      header.style.display = 'flex';
      sidebar.style.display = 'block';
      authContainer.style.display = 'none';
      readingView.style.display = 'block';
    }

    async function bootUser(user) {
      window.__meuUid = user.id;
      mostrarJogo();
      iniciarListenerUsuario(user);
      iniciarSocial(user);
      iniciarMonitorChat(user);
      const { data } = await supabase.from('progresso').select('id').eq('uid', user.id).eq('concluido', true);
      atualizarBarraExpMenu((data || []).length);
      window.carregarListaLivros?.();
    }

    supabase.auth.onAuthStateChange(async (_event, session) => {
      const user = session?.user ?? null;
      const liberado = sessionStorage.getItem('herois_login_liberado') === 'true';
      if (user && liberado) await bootUser(user);
      else {
        pararListenerUsuario();
        mostrarLogin();
      }
    });

    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user && sessionStorage.getItem('herois_login_liberado') === 'true') await bootUser(session.user);
    else mostrarLogin();

    document.addEventListener('DOMContentLoaded', () => {
      const campoData = document.getElementById('reg-data-nascimento');
      campoData?.addEventListener('input', e => {
        let valor = e.target.value.replace(/\D/g, '').slice(0, 8);
        if (valor.length > 4) valor = `${valor.slice(0,2)}/${valor.slice(2,4)}/${valor.slice(4)}`;
        else if (valor.length > 2) valor = `${valor.slice(0,2)}/${valor.slice(2)}`;
        e.target.value = valor;
      });
    });
  </script>
</body>
</html>
