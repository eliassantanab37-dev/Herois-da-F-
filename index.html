<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Heróis da Fé - Plataforma gamificada de leitura da Bíblia">
  <meta name="theme-color" content="#d4af37">
  <title>Heróis da Fé - Jornada Espiritual Gamificada</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4783566653978134" crossorigin="anonymous"></script>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="32x32" href="/imagens/icon-96.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    .auth-action-row.install-share-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      align-items:stretch;
    }
    .auth-action-row.install-share-row .auth-special-btn{
      width:100%;
      min-height:56px;
      border-radius:20px;
      font-weight:700;
      padding:14px 16px;
    }
    .auth-form .btn-mission,
    .auth-form .auth-special-btn,
    .auth-form input,
    .auth-tabs .tab-btn{
      border-radius:20px !important;
    }
    .install-gold-glass{
      color:#170f00;
      background:linear-gradient(135deg, rgba(103,76,7,0.96), rgba(212,175,55,0.82) 36%, rgba(255,237,164,0.98) 50%, rgba(212,175,55,0.82) 64%, rgba(103,76,7,0.96));
      box-shadow:0 12px 28px rgba(212,175,55,0.26), inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -10px 20px rgba(92,66,4,0.22);
      border:1px solid rgba(255,222,124,0.9) !important;
      position:relative;
      overflow:hidden;
    }
    .install-gold-glass::before{
      content:'';
      position:absolute;
      top:0;
      left:-70%;
      width:42%;
      height:100%;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      transform:skewX(-22deg);
      animation:shineInstall 2.8s linear infinite;
    }
    .install-gold-glass::after{
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.16), transparent 42%, rgba(255,255,255,0.05));
      pointer-events:none;
    }
    .install-gold-glass > span,
    .share-compact-glass > span{ position:relative; z-index:2; }
    .share-compact-glass{
      background:linear-gradient(135deg, rgba(9,110,80,0.98), rgba(118,226,203,0.92));
      color:#fff;
      border:1px solid rgba(180,255,236,0.45) !important;
      box-shadow:0 10px 22px rgba(27,161,133,0.18), inset 0 1px 0 rgba(255,255,255,0.22);
    }
    @keyframes shineInstall{ from{ left:-70%; } to{ left:130%; } }
    @media (max-width: 520px){
      .auth-action-row.install-share-row{ grid-template-columns:1fr; }
    }
  </style>

</head>
<body>
  <aside id="side-menu" class="side-menu" style="display:none;">
    <button id="close-menu" class="close-btn">×</button>
    <section class="profile-section">
      <div class="sidebar-user-top">
        <div id="user-profile-pic" class="profile-pic">👤</div>
        <div class="sidebar-user-info">
          <div id="user-name-display">Carregando...</div>
          <div id="user-points-display">0 pts</div>
        </div>
      </div>
      <div class="exp-card">
        <div class="exp-head"><span>Nível <strong id="nivel-numero">1</strong></span><span id="exp-texto">0%</span></div>
        <div class="exp-track"><div id="exp-bar-fill" class="exp-fill"></div></div>
        <div class="exp-sub">EXP para próximo nível</div>
      </div>
      <div class="sidebar-actions-two">
        <button id="btn-perfil-menu" class="glass-btn gold">PERFIL</button>
        <button id="btn-sair-menu" class="glass-btn red">SAIR DO JOGO</button>
      </div>
    </section>

    <section class="sidebar-ad-wrap">
      <h3 class="sidebar-title">PUBLICIDADE</h3>
      <div class="sidebar-ad-card">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-4783566653978134" data-ad-slot="3940373913" data-ad-format="auto" data-full-width-responsive="true"></ins>
      </div>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </section>

    <section class="friend-search-wrap">
      <div class="search-wrap"><span>🔎</span><input type="text" id="sidebar-search-input" placeholder="Buscar amigo" autocomplete="off"></div>
      <div id="sidebar-search-results"></div>
    </section>

    <section class="friends-container">
      <div id="lista-amigos-sidebar" class="scroll-area"><div class="friend-empty">Carregando amigos...</div></div>
    </section>
  </aside>

  <header class="top-nav" style="display:none;">
    <button id="open-menu" class="menu-icon">MENU</button>
    <nav class="nav-buttons"><button id="nav-ranking">🏆 RANKING</button><button id="nav-biblia">📖 BÍBLIA</button></nav>
    <div id="user-header-info"></div>
    <div class="logo-text">HERÓIS DA FÉ</div>
  </header>

  <main id="main-content">
    <section id="auth-container" class="auth-card">
      <div class="auth-header"><span class="auth-logo">⚜️ HERÓIS DA FÉ</span></div>
      <div class="auth-tabs"><button id="tab-entrar" class="tab-btn active">ENTRAR</button><button id="tab-cadastrar" class="tab-btn">CADASTRAR</button></div>
      <form id="form-entrar" class="auth-form">
        <input type="email" id="login-email" placeholder="Seu E-mail" required autocomplete="email">
        <input type="password" id="login-senha" placeholder="Sua Senha" required autocomplete="current-password">
        <button type="button" id="btn-entrar" class="btn-mission gold-shine">ENTRAR NO JOGO</button>
        <div class="auth-action-row secondary"><button type="button" id="btn-recuperar-senha" class="auth-special-btn gray-glass">Recuperar Senha</button></div>
        <div class="auth-action-row install-share-row"><button type="button" id="btn-instalar-app-login" class="auth-special-btn install-gold-glass"><span>📲 Download do App</span></button><button type="button" id="btn-compartilhar-app" class="auth-special-btn share-compact-glass"><span>✨ Compartilhar App</span></button></div>
      </form>
      <form id="form-cadastrar" class="auth-form" style="display:none;">
        <input type="text" id="reg-nome" placeholder="Nome" required maxlength="12" autocomplete="name"><small class="auth-field-tip">Máximo de 12 caracteres</small>
        <input type="email" id="reg-email" placeholder="E-mail" required autocomplete="email">
        <input type="password" id="reg-senha" placeholder="Senha" required minlength="8" autocomplete="new-password"><small class="auth-field-tip">Mínimo de 8 dígitos</small>
        <input type="text" id="reg-data-nascimento" placeholder="dd/mm/aaaa" required inputmode="numeric" maxlength="10" autocomplete="bday">
        <button type="button" id="btn-registrar" class="btn-mission gold-shine compact-mission-btn">INICIAR JORNADA</button>
      </form>
      <div id="reset-password-box" class="auth-form" style="display:none;">
        <input type="password" id="reset-nova-senha" placeholder="Nova senha" minlength="8" autocomplete="new-password"><small class="auth-field-tip">Mínimo de 8 dígitos</small>
        <input type="password" id="reset-confirmar-senha" placeholder="Confirmar nova senha" minlength="8" autocomplete="new-password">
        <div id="reset-password-message" class="auth-field-tip">Digite sua nova senha para concluir.</div>
        <div class="auth-action-row"><button type="button" id="btn-resetar-senha" class="auth-special-btn gold-shine">SALVAR NOVA SENHA</button></div>
        <div class="auth-action-row secondary"><button type="button" id="btn-cancelar-reset" class="auth-special-btn gray-glass">Cancelar</button></div>
      </div>
    </section>

    <section id="reading-view" class="reading-container" style="display:none;"><div id="bible-text"></div></section>
  </main>

  <input type="file" id="foto-input" accept="image/*" style="display:none;">

  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/reset-password.js"></script>
  <script type="module" src="js/bible.js"></script>
  <script type="module" src="js/game.js"></script>
  <script type="module" src="js/ui.js"></script>
  <script type="module" src="js/chat.js"></script>
  <script type="module" src="js/social.js"></script>
  <script type="module" src="js/badges.js"></script>
  <script type="module" src="js/stats.js"></script>
  <script type="module" src="js/challenges.js"></script>

  
  <script type="module">
    import { supabase } from './js/config.js';
    import { atualizarBarraExpMenu } from './js/badges.js';
    import { iniciarListenerUsuario, pararListenerUsuario } from './js/auth.js';
    import { iniciarSocial } from './js/social.js';
    import { iniciarMonitorChat } from './js/chat.js';

    const header = document.querySelector('.top-nav');
    const sidebar = document.getElementById('side-menu');
    const authContainer = document.getElementById('auth-container');
    const readingView = document.getElementById('reading-view');
    const pointsEl = document.getElementById('user-points-display');
    const nivelNum = document.getElementById('nivel-numero');
    const expTexto = document.getElementById('exp-texto');
    const expBar = document.getElementById('exp-bar-fill');

    let currentUid = null;
    let realtimeMenuChannel = null;
    let inicializandoUid = null;
    let appPronto = false;
    window._paginaAtualJogo = 'biblia-home';

    function mostrarTelaLogin() {
      if (header) header.style.display = 'none';
      if (sidebar) {
        sidebar.style.display = 'none';
        sidebar.classList.remove('active');
      }
      document.body.classList.remove('menu-open');
      if (authContainer) authContainer.style.display = 'block';
      if (readingView) readingView.style.display = 'none';
    }

    function mostrarJogo() {
      if (header) header.style.display = 'flex';
      if (sidebar) sidebar.style.display = 'block';
      if (authContainer) authContainer.style.display = 'none';
      if (readingView) readingView.style.display = 'block';
    }

    function aplicarResumoMenu(userData) {
      if (!userData) return;
      if (pointsEl) pointsEl.textContent = `${userData.points || 0} pts`;
      if (nivelNum) nivelNum.textContent = `${userData.nivel || 1}`;
      const ev = userData.expAtual ?? userData.expatual ?? 0;
      if (expTexto) expTexto.textContent = `${ev}%`;
      if (expBar) expBar.style.width = `${ev}%`;
    }

    function limparSobreposicoesUI() {
      document.getElementById('perfil-detalhado')?.remove();
      document.getElementById('janela-chat')?.remove();
      document.getElementById('bible-loading-overlay')?.remove();
      document.body.classList.remove('menu-open');
      sidebar?.classList.remove('active');
    }

    async function atualizarMenuUsuario(uid) {
      const { data: userData } = await supabase.from('users').select('*').eq('uid', uid).single();
      aplicarResumoMenu(userData);
      const { data: progData } = await supabase.from('progresso').select('concluido').eq('uid', uid).eq('concluido', true);
      atualizarBarraExpMenu(progData?.length || 0);
    }

    async function destruirEstadoUsuario() {
      currentUid = null;
      inicializandoUid = null;
      appPronto = false;
      if (realtimeMenuChannel) {
        await supabase.removeChannel(realtimeMenuChannel);
        realtimeMenuChannel = null;
      }
      try { await pararListenerUsuario(); } catch {}
      limparSobreposicoesUI();
      mostrarTelaLogin();
    }

    async function inicializarUsuario(user) {
      if (!user?.id) return;
      if (inicializandoUid === user.id) return;
      if (appPronto && currentUid === user.id) return;

      inicializandoUid = user.id;
      currentUid = user.id;

      try {
        limparSobreposicoesUI();
        mostrarJogo();
        await iniciarListenerUsuario(user);
        iniciarSocial(user);
        iniciarMonitorChat(user);
        await atualizarMenuUsuario(user.id);
        try { await window.carregarListaLivros?.(); } catch (e) { console.error(e); }

        if (realtimeMenuChannel) {
          await supabase.removeChannel(realtimeMenuChannel);
          realtimeMenuChannel = null;
        }

        realtimeMenuChannel = supabase
          .channel('menu-user-' + user.id)
          .on(
            'postgres_changes',
            { event: '*', schema: 'public', table: 'users', filter: `uid=eq.${user.id}` },
            (payload) => {
              // Atualiza pontos/nível no sidebar e header imediatamente com o payload
              aplicarResumoMenu(payload.new);
              // Recalcula e atualiza a barra de EXP buscando total de caps no banco
              supabase
                .from('progresso')
                .select('id', { count: 'exact', head: true })
                .eq('uid', user.id)
                .eq('concluido', true)
                .then(({ count }) => {
                  if (typeof count === 'number') atualizarBarraExpMenu(count);
                });
            }
          )
          .on(
            'postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'progresso', filter: `uid=eq.${user.id}` },
            () => {
              // Novo capítulo lido: re-busca total e atualiza EXP imediatamente
              supabase
                .from('progresso')
                .select('id', { count: 'exact', head: true })
                .eq('uid', user.id)
                .eq('concluido', true)
                .then(({ count }) => {
                  if (typeof count === 'number') atualizarBarraExpMenu(count);
                });
              // Também re-busca pontos/nível do usuário (badges podem ter sido ganhos)
              supabase
                .from('users')
                .select('*')
                .eq('uid', user.id)
                .single()
                .then(({ data }) => { if (data) aplicarResumoMenu(data); });
            }
          )
          .subscribe();

        history.replaceState({ page: 'jogo' }, '');
        appPronto = true;
      } finally {
        inicializandoUid = null;
      }
    }

    supabase.auth.onAuthStateChange(async (_event, session) => {
      const user = session?.user ?? null;
      if (user) {
        await inicializarUsuario(user);
      } else {
        await destruirEstadoUsuario();
      }
    });

    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) {
      await inicializarUsuario(session.user);
    } else {
      await destruirEstadoUsuario();
    }

    window.addEventListener('exp_atualizada', (e) => {
      const totalCaps = e.detail?.totalCaps;
      if (typeof totalCaps === 'number') atualizarBarraExpMenu(totalCaps);
    });

    // Disparado por badges.js quando troféus são concedidos e pontos mudam
    window.addEventListener('pontos_atualizados', async (e) => {
      const uid = e.detail?.uid || currentUid;
      if (!uid) return;
      await atualizarMenuUsuario(uid);
    });

    let promptInstalacao = null;
    function atualizarBotaoInstalar() {
      const btn = document.getElementById('btn-instalar-app-login');
      if (!btn) return;
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.title = promptInstalacao ? 'Instalar app' : 'Abrir instruções de instalação';
    }

    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      promptInstalacao = event;
      atualizarBotaoInstalar();
    });

    window.addEventListener('appinstalled', () => {
      promptInstalacao = null;
      atualizarBotaoInstalar();
    });

    document.addEventListener('click', async (event) => {
      const btnInstalar = event.target.closest('#btn-instalar-app-login');
      if (btnInstalar) {
        if (promptInstalacao) {
          promptInstalacao.prompt();
          try { await promptInstalacao.userChoice; } catch {}
          promptInstalacao = null;
          atualizarBotaoInstalar();
        } else {
          alert('Para instalar: abra o menu do navegador e escolha Instalar aplicativo ou Adicionar à tela inicial.');
        }
      }

      const btnCompartilhar = event.target.closest('#btn-compartilhar-app');
      if (btnCompartilhar) {
        const payload = { title: 'Heróis da Fé', text: 'Venha jogar Heróis da Fé comigo!', url: window.location.href };
        if (navigator.share) {
          try { await navigator.share(payload); } catch {}
        } else {
          await navigator.clipboard.writeText(window.location.href);
          alert('Link copiado!');
        }
      }
    });

    atualizarBotaoInstalar();

    if ('serviceWorker' in navigator) {
      try {
        const reg = await navigator.serviceWorker.register('/sw.js');
        if (reg.waiting) reg.waiting.postMessage('SKIP_WAITING');
      } catch (e) {
        console.warn(e);
      }
    }
  </script>
</body>
</html>
